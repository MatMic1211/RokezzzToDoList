<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Menedżer zadań</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #e6ecf0;
            padding: 40px;
        }

        .box {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 25px;
            max-width: 520px;
            margin: auto;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
        }

        input {
            padding: 12px;
            width: 65%;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px;
            margin: 3px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #6c8cff;
            color: white;
        }

        li {
            list-style: none;
            padding: 10px;
            margin: 6px 0;
            border-radius: 10px;
            background: #f7f9fc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: grab;
            position: relative;
        }

        li.dragging {
            opacity: 0.5;
        }

        /* Linia pokazująca miejsce */
        li.drag-over::before {
            content: "";
            position: absolute;
            top: -4px;
            left: 0;
            right: 0;
            height: 4px;
            background: #6c8cff;
            border-radius: 2px;
        }

        .done {
            text-decoration: line-through;
            color: gray;
            background: #e0e0e0;
        }

        #counter {
            margin: 15px 0;
            text-align: center;
            font-weight: bold;
        }

        .filters {
            text-align: center;
            margin-bottom: 10px;
        }

        .delete-btn {
            background: #ff6b6b;
        }

        .done-btn {
            background: #2ecc71;
        }

        .icons {
            display: flex;
            gap: 5px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2><i class="fa-solid fa-list-check"></i> Menedżer zadań</h2>

    <input type="text" id="taskInput" placeholder="Wpisz zadanie">
    <button onclick="addTask()"><i class="fa-solid fa-plus"></i></button>

    <p id="counter"></p>

    <div class="filters">
        <button onclick="setFilter('all')">Wszystkie</button>
        <button onclick="setFilter('active')">Aktywne</button>
        <button onclick="setFilter('done')">Wykonane</button>
        <button onclick="deleteDone()"><i class="fa-solid fa-trash"></i></button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let filter = "all";
let draggedIndex = null;

document.getElementById("taskInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") addTask();
});

function saveTasks() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask() {
    let input = document.getElementById("taskInput");
    let text = input.value;

    if (text === "") return;

    tasks.push({
        text: text,
        done: false,
        date: new Date().toLocaleDateString()
    });

    input.value = "";
    saveTasks();
    renderTasks();
}

function deleteTask(index) {
    tasks.splice(index, 1);
    saveTasks();
    renderTasks();
}

function toggleTask(index) {
    tasks[index].done = !tasks[index].done;
    saveTasks();
    renderTasks();
}

function deleteDone() {
    tasks = tasks.filter(task => !task.done);
    saveTasks();
    renderTasks();
}

function setFilter(f) {
    filter = f;
    renderTasks();
}

function renderTasks() {
    let list = document.getElementById("taskList");
    list.innerHTML = "";

    let all = tasks.length;
    let done = tasks.filter(t => t.done).length;
    let active = all - done;

    document.getElementById("counter").innerText =
        "Wszystkie: " + all + " | Aktywne: " + active + " | Wykonane: " + done;

    for (let i = 0; i < tasks.length; i++) {

        if (filter === "active" && tasks[i].done) continue;
        if (filter === "done" && !tasks[i].done) continue;

        let li = document.createElement("li");
        li.draggable = true;
        li.dataset.index = i;

        if (tasks[i].done) li.classList.add("done");

        li.addEventListener("dragstart", function() {
            draggedIndex = this.dataset.index;
            li.classList.add("dragging");
        });

        li.addEventListener("dragend", function() {
            li.classList.remove("dragging");
            document.querySelectorAll("li").forEach(el => el.classList.remove("drag-over"));
        });

        li.addEventListener("dragover", function(e) {
            e.preventDefault();
            document.querySelectorAll("li").forEach(el => el.classList.remove("drag-over"));
            li.classList.add("drag-over");
        });

        li.addEventListener("dragleave", function() {
            li.classList.remove("drag-over");
        });

        li.addEventListener("drop", function() {
            let droppedIndex = this.dataset.index;
            let temp = tasks[draggedIndex];
            tasks.splice(draggedIndex, 1);
            tasks.splice(droppedIndex, 0, temp);
            saveTasks();
            renderTasks();
        });

        let span = document.createElement("span");
        span.innerText = tasks[i].text + " (" + tasks[i].date + ")";
        span.onclick = function() {
            toggleTask(i);
        };

        let iconsDiv = document.createElement("div");
        iconsDiv.classList.add("icons");

        let doneBtn = document.createElement("button");
        doneBtn.innerHTML = '<i class="fa-solid fa-check"></i>';
        doneBtn.classList.add("done-btn");
        doneBtn.onclick = function() {
            toggleTask(i);
        };

        let delBtn = document.createElement("button");
        delBtn.innerHTML = '<i class="fa-solid fa-trash"></i>';
        delBtn.classList.add("delete-btn");
        delBtn.onclick = function() {
            deleteTask(i);
        };

        iconsDiv.appendChild(doneBtn);
        iconsDiv.appendChild(delBtn);

        li.appendChild(span);
        li.appendChild(iconsDiv);
        list.appendChild(li);
    }
}

renderTasks();
</script>

</body>
</html>
