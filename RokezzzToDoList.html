<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Menedżer zadań</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #e6ecf0;
            padding: 40px;
        }

        .box {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 25px;
            max-width: 520px;
            margin: auto;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
        }

        .lang-switch {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
            gap: 5px;
        }

        .lang-switch button {
            background: #ddd;
            color: black;
            padding: 6px 12px;
        }

        .lang-switch button.active {
            background: #6c8cff;
            color: white;
        }

        .add-task {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-bottom: 10px;
        }

        .add-task input {
            padding: 12px;
            width: 60%;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px;
            margin: 3px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #6c8cff;
            color: white;
        }

        li {
            list-style: none;
            padding: 10px;
            margin: 6px 0;
            border-radius: 10px;
            background: #f7f9fc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: grab;
            position: relative;
        }

        li.dragging {
            opacity: 0.5;
        }

        li.drag-over::before {
            content: "";
            position: absolute;
            top: -4px;
            left: 0;
            right: 0;
            height: 4px;
            background: #6c8cff;
            border-radius: 2px;
        }

        .done {
            text-decoration: line-through;
            color: gray;
            background: #e0e0e0;
        }

        #counter {
            margin: 15px 0;
            text-align: center;
            font-weight: bold;
        }

        .filters {
            text-align: center;
            margin-bottom: 10px;
        }

        .delete-btn {
            background: #ff6b6b;
        }

        .done-btn {
            background: #2ecc71;
        }

        .icons {
            display: flex;
            gap: 5px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2 id="title"><i class="fa-solid fa-list-check"></i> Menedżer zadań</h2>

    <div class="lang-switch">
        <button id="plBtn">PL</button>
        <button id="enBtn">EN</button>
    </div>

    <div class="add-task">
        <input type="text" id="taskInput" placeholder="Wpisz zadanie">
        <button id="addBtn">
            <i class="fa-solid fa-plus"></i> Dodaj
        </button>
    </div>

    <p id="counter"></p>

    <div class="filters">
        <button id="allBtn">Wszystkie</button>
        <button id="activeBtn">Aktywne</button>
        <button id="doneFilterBtn">Wykonane</button>
        <button id="deleteDoneBtn">
            <i class="fa-solid fa-trash"></i> Usuń wykonane
        </button>
    </div>

    <ul id="taskList"></ul>
</div>

</body>

<script>
const taskInput = document.getElementById("taskInput");
const taskList = document.getElementById("taskList");
const counter = document.getElementById("counter");

const plBtn = document.getElementById("plBtn");
const enBtn = document.getElementById("enBtn");
const addBtn = document.getElementById("addBtn");
const allBtn = document.getElementById("allBtn");
const activeBtn = document.getElementById("activeBtn");
const doneFilterBtn = document.getElementById("doneFilterBtn");
const deleteDoneBtn = document.getElementById("deleteDoneBtn");

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let filter = localStorage.getItem("filter") || "all";
let draggedIndex = null;
let lang = localStorage.getItem("lang") || "pl";

const translations = {
    pl: {
        title: "Menedżer zadań",
        placeholder: "Wpisz zadanie",
        add: "Dodaj",
        all: "Wszystkie",
        active: "Aktywne",
        done: "Wykonane",
        deleteDone: "Usuń wykonane",
        counter: "Wszystkie: {all} | Aktywne: {active} | Wykonane: {done}"
    },
    en: {
        title: "Task Manager",
        placeholder: "Enter task",
        add: "Add",
        all: "All",
        active: "Active",
        done: "Completed",
        deleteDone: "Delete completed",
        counter: "All: {all} | Active: {active} | Completed: {done}"
    }
};

taskInput.addEventListener("keypress", e => {
    if (e.key === "Enter") addTask();
});

addBtn.onclick = addTask;
allBtn.onclick = () => setFilter("all");
activeBtn.onclick = () => setFilter("active");
doneFilterBtn.onclick = () => setFilter("done");
deleteDoneBtn.onclick = deleteDone;
plBtn.onclick = () => setLanguage("pl");
enBtn.onclick = () => setLanguage("en");

function saveTasks() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask() {
    const text = taskInput.value.trim();
    if (!text) return;

    tasks.push({
        text,
        done: false,
        date: new Date().toLocaleString()
    });

    taskInput.value = "";
    saveTasks();
    renderTasks();
}

function deleteTask(index) {
    tasks.splice(index, 1);
    saveTasks();
    renderTasks();
}

function toggleTask(index) {
    tasks[index].done = !tasks[index].done;
    saveTasks();
    renderTasks();
}

function deleteDone() {
    tasks = tasks.filter(t => !t.done);
    saveTasks();
    renderTasks();
}

function setFilter(f) {
    filter = f;
    localStorage.setItem("filter", f);
    renderTasks();
}

function setLanguage(selectedLang) {
    lang = selectedLang;
    localStorage.setItem("lang", lang);
    applyTranslations();
    renderTasks();
    updateLangButtons();
}

function updateLangButtons() {
    plBtn.classList.remove("active");
    enBtn.classList.remove("active");
    if (lang === "pl") plBtn.classList.add("active");
    else enBtn.classList.add("active");
}

function applyTranslations() {
    document.getElementById("title").innerHTML =
        '<i class="fa-solid fa-list-check"></i> ' + translations[lang].title;

    taskInput.placeholder = translations[lang].placeholder;
    addBtn.innerHTML = '<i class="fa-solid fa-plus"></i> ' + translations[lang].add;
    allBtn.innerText = translations[lang].all;
    activeBtn.innerText = translations[lang].active;
    doneFilterBtn.innerText = translations[lang].done;
    deleteDoneBtn.innerHTML =
        '<i class="fa-solid fa-trash"></i> ' + translations[lang].deleteDone;
}

function updateCounter() {
    const all = tasks.length;
    const done = tasks.filter(t => t.done).length;
    const active = all - done;

    counter.innerText = translations[lang].counter
        .replace("{all}", all)
        .replace("{active}", active)
        .replace("{done}", done);
}

function createTaskElement(task, index) {
    const li = document.createElement("li");
    li.draggable = true;

    if (task.done) li.classList.add("done");

    li.addEventListener("dragstart", () => {
        draggedIndex = index;
        li.classList.add("dragging");
    });

    li.addEventListener("dragend", () => {
        li.classList.remove("dragging");
        document.querySelectorAll("li").forEach(el => el.classList.remove("drag-over"));
    });

    li.addEventListener("dragover", e => {
        e.preventDefault();
        document.querySelectorAll("li").forEach(el => el.classList.remove("drag-over"));
        li.classList.add("drag-over");
    });

    li.addEventListener("dragleave", () => li.classList.remove("drag-over"));

    li.addEventListener("drop", () => {
        const temp = tasks[draggedIndex];
        tasks.splice(draggedIndex, 1);
        tasks.splice(index, 0, temp);
        saveTasks();
        renderTasks();
    });

    const span = document.createElement("span");
    span.innerText = `${task.text} (${task.date})`;
    span.onclick = () => toggleTask(index);

    const icons = document.createElement("div");
    icons.classList.add("icons");

    const doneBtn = document.createElement("button");
    doneBtn.innerHTML = '<i class="fa-solid fa-check"></i>';
    doneBtn.classList.add("done-btn");
    doneBtn.onclick = () => toggleTask(index);

    const delBtn = document.createElement("button");
    delBtn.innerHTML = '<i class="fa-solid fa-trash"></i>';
    delBtn.classList.add("delete-btn");
    delBtn.onclick = () => deleteTask(index);

    icons.append(doneBtn, delBtn);
    li.append(span, icons);

    return li;
}

function renderTasks() {
    taskList.innerHTML = "";
    updateCounter();

    tasks.forEach((task, i) => {
        if (filter === "active" && task.done) return;
        if (filter === "done" && !task.done) return;
        taskList.appendChild(createTaskElement(task, i));
    });
}

applyTranslations();
updateLangButtons();
renderTasks();
</script>

</html>
