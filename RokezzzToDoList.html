<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Task App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body 
		{
            font-family: Arial, sans-serif;
            background: #e6ecf0;
            padding: 40px;
        }

        .container 
		{
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 25px;
            max-width: 520px;
            margin: auto;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        h2 
		{ 
		text-align: center; 
		}

        .top-bar 
		{
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-bottom: 15px;
        }

        .top-bar button 
		{
            background: #ddd;
            color: black;
            padding: 6px 12px;
        }

        .top-bar .active 
		
		{
            background: #6c8cff;
            color: white;
        }
		
        .task-input 
		{
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-bottom: 10px;
        }

        .task-input input 
		{
            padding: 12px;
            width: 60%;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        button 
		{
            padding: 10px;
            margin: 3px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #6c8cff;
            color: white;
        }

        select 
		{
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
            margin-top: 5px;
        }

        ul { padding: 0; }

        li {
            list-style: none;
            padding: 10px;
            margin: 6px 0;
            border-radius: 10px;
            background: #f7f9fc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: grab;
            position: relative;
        }

        li.done 
		{
            text-decoration: line-through;
            color: gray;
            background: #e0e0e0;
        }

        li.dragging { opacity: 0.5; }

        li.drag-over::before 
		{
            content: "";
            position: absolute;
            top: -4px;
            left: 0;
            right: 0;
            height: 4px;
            background: #6c8cff;
            border-radius: 2px;
        }

        .actions 
		{
            display: flex;	
            gap: 5px;
        }

        .btn-delete { background: #ff6b6b; }
        .btn-done { background: #2ecc71; }

        #stats 
		{
            text-align: center;
            font-weight: bold;
            margin: 10px 0;
        }

        .filters { text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="appTitle"><i class="fa-solid fa-list-check"></i> Menedżer zadań</h2>

    <div class="top-bar">
        <button id="langPL">PL</button>
        <button id="langEN">EN</button>
    </div>

    <div class="task-input">
        <input type="text" id="inputTask" placeholder="Wpisz zadanie">
        <button id="btnAdd"><i class="fa-solid fa-plus"></i> Dodaj</button>
    </div>

    <p id="stats"></p>

    <div class="filters">
        <button id="fAll">Wszystkie</button>
        <button id="fActive">Aktywne</button>
        <button id="fDone">Wykonane</button>
        <button id="fDeleteDone"><i class="fa-solid fa-trash"></i> Usuń wykonane</button>
    </div>

    <div class="filters">
        <select id="sortBox"></select>
    </div>

    <ul id="list"></ul>
</div>

<script>
const input = document.getElementById("inputTask");
const list = document.getElementById("list");
const stats = document.getElementById("stats");
const sortBox = document.getElementById("sortBox");

let data = JSON.parse(localStorage.getItem("tasks")) || [];
let currentFilter = localStorage.getItem("filter") || "all";
let sortType = localStorage.getItem("sortMode") || "date";
let currentLang = localStorage.getItem("lang") || "pl";
let dragIndex = null;

const txt = 
{
    pl: 
	{
        title: "Menedżer zadań",
        placeholder: "Wpisz zadanie",
        add: "Dodaj",
        all: "Wszystkie",
        active: "Aktywne",
        done: "Wykonane",
        deleteDone: "Usuń wykonane",
        stats: "Wszystkie: {all} | Aktywne: {active} | Wykonane: {done}",
        s1: "Sortuj: data",
        s2: "Sortuj: A-Z",
        s3: "Sortuj: Z-A",
        s4: "Najpierw niewykonane",
		s5: "Najpierw wykonane"
    },
    en: 
	{
        title: "Task Manager",
        placeholder: "Enter task",
        add: "Add",
        all: "All",
        active: "Active",
        done: "Completed",
        deleteDone: "Delete completed",
        stats: "All: {all} | Active: {active} | Completed: {done}",
        s1: "Sort by: date",
        s2: "Sort by: A-Z",
        s3: "Sort by: Z-A",
        s4: "Undone first",
		s5: "Done first"
    }
};

function save() 
{
    localStorage.setItem("tasks", JSON.stringify(data));
}

function addNewTask() 
{
    const value = input.value.trim();
    if (!value) return;

    data.push(
	{
        text: value,
        done: false,
        date: new Date().toISOString()
    });

    input.value = "";
    save();
    draw();
}

function removeTask(i) 
{
    data.splice(i, 1);
    save();
    draw();
}

function toggleDone(i) 
{
    data[i].done = !data[i].done;
    save();
    draw();
}

function clearDone() 
{
    data = data.filter(t => !t.done);
    save();
    draw();
}

function setFilterMode(mode) 
{
    currentFilter = mode;
    localStorage.setItem("filter", mode);
    draw();
}

function changeLanguage(l) 
{
    currentLang = l;
    localStorage.setItem("lang", l);
    applyText();
    updateSortBox();
    draw();
}

function updateSortBox() 
{
    sortBox.innerHTML = `
        <option value="date">${txt[currentLang].s1}</option>
        <option value="az">${txt[currentLang].s2}</option>
        <option value="za">${txt[currentLang].s3}</option>
        <option value="undone">${txt[currentLang].s4}</option>
		<option value="done">${txt[currentLang].s5}</option>
    `;
    sortBox.value = sortType;
}

function applyText() 
{
    document.getElementById("appTitle").innerHTML =
        '<i class="fa-solid fa-list-check"></i> ' + txt[currentLang].title;

    input.placeholder = txt[currentLang].placeholder;
    document.getElementById("btnAdd").innerHTML =
        '<i class="fa-solid fa-plus"></i> ' + txt[currentLang].add;

    document.getElementById("fAll").innerText = txt[currentLang].all;
    document.getElementById("fActive").innerText = txt[currentLang].active;
    document.getElementById("fDone").innerText = txt[currentLang].done;
    document.getElementById("fDeleteDone").innerHTML =
        '<i class="fa-solid fa-trash"></i> ' + txt[currentLang].deleteDone;
}

function updateStats() 
{
    const all = data.length;
    const done = data.filter(t => t.done).length;
    const active = all - done;

    stats.innerText = txt[currentLang].stats
        .replace("{all}", all)
        .replace("{active}", active)
        .replace("{done}", done);
}

function draw() 
{
    list.innerHTML = "";
    updateStats();

    let arr = [...data];

    if (sortType === "date") arr.sort((a,b)=> new Date(a.date)-new Date(b.date));
    if (sortType === "az") arr.sort((a,b)=> a.text.localeCompare(b.text));
    if (sortType === "za") arr.sort((a,b)=> b.text.localeCompare(a.text));
    if (sortType === "undone") arr.sort((a,b)=> a.done - b.done);
	if (sortType === "done") arr.sort((a,b)=> b.done - a.done);

    arr.forEach((task, i) => 
	{
        if (currentFilter === "active" && task.done) return;
        if (currentFilter === "done" && !task.done) return;

        const li = document.createElement("li");
        li.draggable = true;
        if (task.done) li.classList.add("done");

        li.addEventListener("dragstart", () => dragIndex = i);
        li.addEventListener("drop", () => 
		{
            const tmp = data[dragIndex];
            data.splice(dragIndex, 1);
            data.splice(i, 0, tmp);
            save();
            draw();
        });
        li.addEventListener("dragover", e => e.preventDefault());

        const span = document.createElement("span");
        span.innerText = `${task.text} (${new Date(task.date).toLocaleString()})`;
        span.onclick = () => toggleDone(i);

        const actions = document.createElement("div");
        actions.className = "actions";

        const doneBtn = document.createElement("button");
        doneBtn.innerHTML = '<i class="fa-solid fa-check"></i>';
        doneBtn.className = "btn-done";
        doneBtn.onclick = () => toggleDone(i);

        const delBtn = document.createElement("button");
        delBtn.innerHTML = '<i class="fa-solid fa-trash"></i>';
        delBtn.className = "btn-delete";
        delBtn.onclick = () => removeTask(i);

        actions.append(doneBtn, delBtn);
        li.append(span, actions);
        list.appendChild(li);
    });
}

document.getElementById("btnAdd").onclick = addNewTask;
input.addEventListener("keypress", e => { if (e.key === "Enter") addNewTask(); });

document.getElementById("fAll").onclick = () => setFilterMode("all");
document.getElementById("fActive").onclick = () => setFilterMode("active");
document.getElementById("fDone").onclick = () => setFilterMode("done");
document.getElementById("fDeleteDone").onclick = clearDone;

document.getElementById("langPL").onclick = () => changeLanguage("pl");
document.getElementById("langEN").onclick = () => changeLanguage("en");

sortBox.onchange = () => 
{
    sortType = sortBox.value;
    localStorage.setItem("sortMode", sortType);
    draw();
};

applyText();
updateSortBox();
draw();
</script>

</body>
</html>
